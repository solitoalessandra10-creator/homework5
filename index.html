<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulazione GBM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>Simulazione Geometric Brownian Motion (GBM)</h1>

    <div>
        <label>Numero di passi (n):</label>
        <input type="number" id="passi" value="1000">

        <label>Orizzonte temporale (T):</label>
        <input type="number" id="tempo" value="1" step="0.1">

        <br><br>

        <label>Valore iniziale (S₀):</label>
        <input type="number" id="S0" value="100">

        <label>Drift (μ):</label>
        <input type="number" id="mu" value="0.1" step="0.01">

        <label>Volatilità (σ):</label>
        <input type="number" id="sigma" value="0.2" step="0.01">
    </div>

    <br>

    <button id="btnGenera">Genera GBM</button>
    <button id="btnReset">Reset</button>

    <br><br>

    <canvas id="grafico"></canvas>

    <div id="stats"></div>

    <script src="script.js"></script>
</body>
</html>
